<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍓 Админ-панель</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF4757; --primary-dark: #E63946; --bg: #FFF5F5; --card-bg: #FFFFFF;
            --text-dark: #1A1A2E; --text-secondary: #6B7280; --text-muted: #9CA3AF;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow: 0 4px 6px rgba(0,0,0,0.07);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.1); --radius-2xl: 24px; --radius-xl: 20px;
            --radius-lg: 16px; --radius-md: 12px; --radius-sm: 8px;
            --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:var(--font); background:linear-gradient(135deg,#FFF5F5,#FFE8EC,#FFF0F0); min-height:100vh; padding:16px 16px 100px; }
        .container { max-width:800px; margin:0 auto; }
        .header { text-align:center; padding:20px 0; }
        .header-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,.9); backdrop-filter:blur(20px); color:var(--primary); font-size:11px; font-weight:600; padding:6px 16px; border-radius:100px; margin-bottom:12px; border:1px solid rgba(255,71,87,.2); }
        .header h1 { font-size:28px; font-weight:800; }
        .header h1 span { background:linear-gradient(135deg,var(--primary),#FF8A80); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:16px; }
        .stat-card { background:rgba(255,255,255,.8); backdrop-filter:blur(20px); padding:14px 10px; border-radius:var(--radius-lg); text-align:center; border:1px solid rgba(255,255,255,.3); }
        .stat-card .val { font-size:22px; font-weight:800; }
        .stat-card .lbl { font-size:10px; color:var(--text-muted); margin-top:2px; }
        .tabs { display:flex; gap:6px; margin-bottom:16px; padding:4px; background:rgba(255,255,255,.6); backdrop-filter:blur(20px); border-radius:var(--radius-xl); }
        .tabs button { flex:1; padding:10px 8px; border-radius:var(--radius-lg); border:none; background:transparent; font-size:12px; font-weight:500; color:var(--text-secondary); cursor:pointer; font-family:var(--font); display:flex; align-items:center; justify-content:center; gap:5px; position:relative; }
        .tabs button.active { background:#fff; color:var(--primary); font-weight:600; box-shadow:var(--shadow); }
        .tabs button .tab-badge { position:absolute; top:2px; right:4px; background:var(--primary); color:#fff; font-size:10px; font-weight:700; min-width:18px; height:18px; border-radius:50%; display:none; align-items:center; justify-content:center; }
        .tabs button .tab-badge.show { display:flex; }
        .panel { display:none; animation:fadeIn .3s; }
        .panel.active { display:block; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .btn { padding:10px 18px; border-radius:var(--radius-md); border:none; font-size:13px; font-weight:600; cursor:pointer; font-family:var(--font); display:inline-flex; align-items:center; gap:6px; }
        .btn-primary { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff; box-shadow:0 4px 12px rgba(255,71,87,.3); }
        .btn-outline { background:#fff; border:2px solid #F1F5F9; }
        .btn-danger { background:#EF4444; color:#fff; }
        .btn-sm { padding:6px 14px; font-size:11px; }
        .btn-xs { padding:4px 10px; font-size:10px; border-radius:20px; }
        .tech-card { background:linear-gradient(135deg,#4ADE80,#22C55E); color:#fff; cursor:pointer; }
        .tech-card.off { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); }
        .row-btns { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; align-items:center; }
        .row-btns select { padding:8px 14px; border:2px solid #F1F5F9; border-radius:var(--radius-md); font-size:13px; font-family:var(--font); background:#fff; }
        .order-card { background:#fff; border-radius:var(--radius-lg); padding:14px; margin-bottom:10px; border:1px solid #F1F5F9; }
        .order-card .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
        .order-card .oid { font-weight:700; color:var(--primary); font-size:15px; }
        .order-card .status { font-size:10px; font-weight:600; padding:3px 10px; border-radius:100px; }
        .status-waiting { background:#FFF3E0; color:#E65100; } .status-done { background:#E8F5E9; color:#2E7D32; } .status-cancelled { background:#FFEBEE; color:#D32F2F; }
        .order-card .items { font-size:12px; color:var(--text-secondary); background:#F8FAFC; padding:8px 12px; border-radius:var(--radius-sm); margin-bottom:6px; }
        .order-card .bottom { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
        .order-card .total { font-weight:700; color:var(--primary); font-size:16px; }
        .order-card .chat-plate { display:flex; align-items:center; gap:8px; background:linear-gradient(135deg,#FF4757,#FF6B81); color:#fff; border-radius:14px; padding:10px 14px; margin-top:8px; cursor:pointer; width:100%; border:none; }
        .order-card .chat-plate .msg-preview { flex:1; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .order-card .chat-plate .msg-badge { background:#fff; color:var(--primary); font-size:11px; font-weight:700; min-width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
        .chat-item { background:#fff; border-radius:var(--radius-lg); padding:14px; margin-bottom:8px; border:1px solid #F1F5F9; cursor:pointer; }
        .review-card { background:#fff; border-radius:var(--radius-lg); padding:14px; margin-bottom:8px; border:1px solid #F1F5F9; }
        .review-card .stars { color:#FFB300; font-size:16px; }
        .empty-state { text-align:center; padding:40px; color:var(--text-muted); }
        .empty-state i { font-size:48px; display:block; margin-bottom:12px; }
        .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#1A1A2E; color:#fff; padding:12px 24px; border-radius:100px; font-size:13px; z-index:9999; display:none; }
        .toast.show { display:block; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.4); backdrop-filter:blur(12px); z-index:1000; justify-content:center; align-items:center; padding:20px; }
        .modal-overlay.open { display:flex; }
        .modal { background:#fff; border-radius:var(--radius-2xl); max-width:460px; width:100%; max-height:85vh; overflow-y:auto; padding:24px; position:relative; }
        .modal-close { position:absolute; top:14px; right:14px; background:#F8FAFC; border:none; width:32px; height:32px; border-radius:50%; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .form-group { margin-bottom:12px; }
        .form-group label { display:block; font-size:12px; font-weight:600; margin-bottom:4px; }
        .form-group input, .form-group textarea, .form-group select { width:100%; padding:10px 14px; border:2px solid #F1F5F9; border-radius:var(--radius-md); font-size:14px; background:#F8FAFC; outline:none; font-family:var(--font); }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color:var(--primary); }
        @media (max-width:500px) { .stats { grid-template-columns:1fr 1fr; } }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="container">
        <div class="header"><div class="header-badge"><i class="fas fa-lock"></i> Панель управления</div><h1><span>Strawberry</span> Админка</h1></div>
        <div class="stats">
            <div class="stat-card"><div class="val" id="statTotal">0</div><div class="lbl">Всего</div></div>
            <div class="stat-card"><div class="val" id="statActive">0</div><div class="lbl">Активных</div></div>
            <div class="stat-card"><div class="val" id="statToday">0</div><div class="lbl">Сегодня</div></div>
            <div class="stat-card"><div class="val" id="statRevenue">0 ₽</div><div class="lbl">Выручка</div></div>
        </div>
        <div class="card tech-card" id="techCard" onclick="toggleTechBreak()"><div style="display:flex;justify-content:space-between;"><div><div style="font-weight:700;font-size:18px;" id="techLabel">✅ Работаем</div></div><div style="font-size:28px;opacity:.6;"><i class="fas fa-power-off"></i></div></div></div>
        <div class="tabs">
            <button class="active" data-tab="orders"><i class="fas fa-list-alt"></i> Заказы</button>
            <button data-tab="menu"><i class="fas fa-utensils"></i> Меню</button>
            <button data-tab="chats"><i class="fas fa-comments"></i> Чаты <span class="tab-badge" id="chatsBadge">0</span></button>
            <button data-tab="reviews"><i class="fas fa-star"></i> Отзывы</button>
        </div>
        <div class="panel active" id="panel-orders"><div class="row-btns"><button class="btn btn-primary btn-sm" onclick="loadOrders()"><i class="fas fa-sync-alt"></i></button><button class="btn btn-outline btn-sm" onclick="clearOrders()"><i class="fas fa-trash"></i></button></div><div id="ordersList"><div class="empty-state"><i class="fas fa-inbox"></i>Нет заказов</div></div></div>
        <div class="panel" id="panel-menu"><div class="row-btns"><button class="btn btn-primary btn-sm" onclick="openItemModal()"><i class="fas fa-plus"></i></button><button class="btn btn-outline btn-sm" onclick="loadMenu()"><i class="fas fa-sync-alt"></i></button><select id="menuFilter" onchange="renderMenu()"><option value="all">Все</option><option value="strawberry">🍓 Клубника</option><option value="fruits">🍉 Фрукты</option><option value="drinks">🥤 Напитки</option></select></div><div id="menuList"><div class="empty-state">Загрузка...</div></div></div>
        <div class="panel" id="panel-chats"><div class="row-btns"><button class="btn btn-primary btn-sm" onclick="loadChats()"><i class="fas fa-sync-alt"></i></button></div><div id="chatsList"><div class="empty-state"><i class="fas fa-comment-dots"></i>Нет чатов</div></div></div>
        <div class="panel" id="panel-reviews"><div class="row-btns"><button class="btn btn-primary btn-sm" onclick="loadReviews()"><i class="fas fa-sync-alt"></i></button></div><div id="reviewsList"><div class="empty-state"><i class="fas fa-star"></i>Нет отзывов</div></div></div>
    </div>
    <div class="modal-overlay" id="chatModal"><div class="modal" style="display:flex;flex-direction:column;max-height:75vh;padding:0;"><div style="padding:14px 20px;border-bottom:1px solid #F1F5F9;display:flex;justify-content:space-between;flex-shrink:0;"><div style="font-weight:700;" id="chatTitle">💬 Чат</div><button class="modal-close" style="position:static;" onclick="closeChatModal()"><i class="fas fa-times"></i></button></div><div id="chatMessages" style="flex:1;padding:16px 20px;overflow-y:auto;"></div><div style="padding:12px 20px;border-top:1px solid #F1F5F9;display:flex;gap:8px;flex-shrink:0;"><input type="text" id="chatInput" placeholder="Сообщение..." style="flex:1;padding:10px 14px;border:2px solid #F1F5F9;border-radius:var(--radius-md);font-size:14px;outline:none;font-family:var(--font);" onkeydown="if(event.key==='Enter')sendChat()"><button class="btn btn-primary btn-sm" onclick="sendChat()">📤</button></div></div></div>

    <script>
        if (localStorage.getItem('admin_auth') !== 'ok') {
            const pass = prompt('🔐 Пароль:');
            if (pass !== 'klubnika270192') { document.body.innerHTML = '<div style="text-align:center;padding:100px;font-family:var(--font);"><h1 style="color:#EF4444;">❌ Доступ запрещён</h1></div>'; throw new Error(); }
            localStorage.setItem('admin_auth', 'ok');
        }

        const S = { settings:{}, menu:[], tab:'orders', chatPhone:null, orders:[], chats:[], totalUnread:0 };
        const $ = id => document.getElementById(id);

        function toast(msg) { const t = $('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500); }

        async function api(url, method = 'GET', body = null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch('/api' + url, opts);
            return res.json();
        }

        document.querySelectorAll('.tabs button').forEach(b => {
            b.addEventListener('click', function() {
                S.tab = this.dataset.tab;
                document.querySelectorAll('.tabs button').forEach(x => x.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                $('panel-' + S.tab).classList.add('active');
                if (S.tab === 'orders') loadOrders();
                if (S.tab === 'menu') loadMenu();
                if (S.tab === 'chats') loadChats();
                if (S.tab === 'reviews') loadReviews();
            });
        });

        async function toggleTechBreak() {
            const v = !S.settings.technicalBreak;
            const d = await api('/settings', 'POST', { technicalBreak: v });
            if (d.success) { S.settings = d.settings; $('techLabel').textContent = v ? '🔧 Перерыв' : '✅ Работаем'; $('techCard').classList.toggle('off', v); }
        }

        async function loadOrders() {
            S.orders = await api('/orders');
            updateStats();
            renderOrders();
        }

        function updateStats() {
            const today = new Date().toDateString();
            const active = S.orders.filter(o => o.status === 'ожидает');
            let rev = 0;
            S.orders.forEach(o => { if (o.items) o.items.forEach(i => rev += (i.price||0)*(i.quantity||1)); });
            $('statTotal').textContent = S.orders.length;
            $('statActive').textContent = active.length;
            $('statToday').textContent = S.orders.filter(o => new Date(o.createdAt).toDateString() === today).length;
            $('statRevenue').textContent = rev + ' ₽';
        }

        function getChatInfo(phone) {
            const c = S.chats.find(x => x.phone === phone);
            if (!c || !c.lastMessage || c.lastMessage.from !== 'client') return null;
            return { text: c.lastMessage.text, unread: c.unread || 0 };
        }

        function renderOrders() {
            const list = $('ordersList');
            if (!S.orders.length) { list.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i>Нет заказов</div>'; return; }
            list.innerHTML = [...S.orders].reverse().map(order => {
                const itemsHtml = order.items?.map(i => `${i.name} ×${i.quantity} — ${(i.price||0)*(i.quantity||1)}₽`).join('<br>') || '';
                let sc = order.status === 'выполнен' ? 'status-done' : order.status?.includes('отменен') ? 'status-cancelled' : 'status-waiting';
                const acts = order.status === 'ожидает' ? `<button class="btn btn-primary btn-xs" onclick="confirmOrder(${order.id},'${order.confirmCode}')">✅</button><button class="btn btn-danger btn-xs" onclick="cancelOrder(${order.id})">❌</button>` : '';
                const ci = getChatInfo(order.customerPhone);
                let plate = '';
                if (ci && order.status === 'ожидает') plate = `<div class="chat-plate" onclick="openChat('${order.customerPhone}','${order.customerName||'Клиент'}')"><span class="msg-preview">💬 ${ci.text}</span>${ci.unread>0?`<span class="msg-badge">${ci.unread}</span>`:''}</div>`;
                return `<div class="order-card"><div class="top"><span class="oid">🏠 #${order.bungalow||'?'} — #${order.id}</span><span class="status ${sc}">${order.status}</span></div><div style="font-size:12px;color:var(--text-secondary);">👤 ${order.customerName} 📞 ${order.customerPhone} ${order.confirmCode?'🔑 <b>'+order.confirmCode+'</b>':''}</div><div class="items">${itemsHtml}</div><div class="bottom"><span class="total">💰 ${order.total||0} ₽</span><span style="font-size:10px;color:var(--text-muted);">${new Date(order.createdAt).toLocaleString()}</span><div>${acts}</div></div>${plate}</div>`;
            }).join('');
        }

        async function confirmOrder(id, code) { if(!confirm('Подтвердить?'))return; await api('/confirm','POST',{orderId:id,code}); loadOrders(); }
        async function cancelOrder(id) { if(!confirm('Отменить?'))return; await api('/cancel','POST',{orderId:id}); loadOrders(); }
        async function clearOrders() { if(!confirm('Удалить все?'))return; await api('/clear-orders','POST'); loadOrders(); }

        async function loadChats() {
            const d = await api('/chats');
            S.chats = d.chats || [];
            S.totalUnread = S.chats.reduce((s,c) => s + (c.unread||0), 0);
            const badge = $('chatsBadge');
            if (S.totalUnread > 0) { badge.textContent = S.totalUnread; badge.classList.add('show'); }
            else badge.classList.remove('show');
            const list = $('chatsList');
            if (!S.chats.length) { list.innerHTML = '<div class="empty-state"><i class="fas fa-comment-dots"></i>Нет чатов</div>'; return; }
            list.innerHTML = S.chats.map(c => `<div class="chat-item" onclick="openChat('${c.phone}','${c.name||'Клиент'}')"><div class="cname">👤 ${c.name||'Клиент'} 📞 ${c.phone} ${c.unread?`<span style="background:var(--primary);color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;">${c.unread}</span>`:''}</div><div class="cpreview">${c.lastMessage?.text||''}</div></div>`).join('');
        }

        function openChat(phone, name) {
            S.chatPhone = phone;
            $('chatTitle').textContent = `💬 ${name} (${phone})`;
            $('chatModal').classList.add('open');
            loadMessages();
            api('/chat-read', 'POST', { phone }).then(() => loadChats());
        }

        async function loadMessages() {
            const d = await api('/chat-messages?phone=' + S.chatPhone);
            const msgs = d.messages || [];
            const c = $('chatMessages');
            if (!msgs.length) { c.innerHTML = '<div class="empty-state">Начните диалог</div>'; return; }
            c.innerHTML = msgs.map(m => `<div style="margin-bottom:6px;display:flex;justify-content:${m.from==='client'?'flex-start':'flex-end'};"><div style="max-width:80%;padding:8px 12px;border-radius:${m.from==='client'?'var(--radius-lg) var(--radius-lg) var(--radius-lg) 4px':'var(--radius-lg) var(--radius-lg) 4px var(--radius-lg)'};background:${m.from==='client'?'#F8FAFC':'linear-gradient(135deg,var(--primary),var(--primary-dark))'};color:${m.from==='client'?'var(--text-dark)':'#fff'};font-size:13px;">${m.text}<span style="font-size:9px;display:block;margin-top:3px;opacity:.6;">${new Date(m.time).toLocaleTimeString()}</span></div></div>`).join('');
            c.scrollTop = c.scrollHeight;
        }

        async function sendChat() {
            const t = $('chatInput').value.trim();
            if (!t || !S.chatPhone) return;
            await api('/chat-send', 'POST', { phone: S.chatPhone, text: t, from: 'admin' });
            $('chatInput').value = '';
            loadMessages();
            loadChats();
        }

        function closeChatModal() { $('chatModal').classList.remove('open'); S.chatPhone = null; }

        async function loadReviews() {
            const d = await api('/reviews');
            const revs = d.reviews || [];
            const list = $('reviewsList');
            if (!revs.length) { list.innerHTML = '<div class="empty-state"><i class="fas fa-star"></i>Нет отзывов</div>'; return; }
            list.innerHTML = revs.map(r => `<div class="review-card"><div style="display:flex;justify-content:space-between;"><span style="font-weight:600;">${r.name||'Клиент'}</span><span class="stars">${'⭐'.repeat(r.rating||5)}</span></div><div style="font-size:13px;color:var(--text-secondary);margin:4px 0;">${r.text||''}</div><div style="display:flex;justify-content:space-between;"><span style="font-size:10px;color:var(--text-muted);">#${r.orderId}</span><button class="btn btn-danger btn-xs" onclick="deleteReview(${r.id})">🗑️</button></div></div>`).join('');
        }

        async function deleteReview(id) { if(!confirm('Удалить?'))return; await fetch('/api/review/'+id,{method:'DELETE'}); loadReviews(); }

        $('chatModal').addEventListener('click', function(e) { if(e.target===this) closeChatModal(); });

        let lastCount = 0;
        setInterval(async () => {
            try {
                const o = await api('/orders');
                if (o.length > lastCount && lastCount > 0) toast('📦 Новый заказ!');
                lastCount = o.length;
                if (S.tab === 'orders') { S.orders = o; updateStats(); renderOrders(); }
                loadChats();
            } catch(e) {}
        }, 10000);

        (async () => { await loadOrders(); await loadChats(); lastCount = S.orders.length; })();
    </script>
</body>
</html>
