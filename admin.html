<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍓 Админ-панель</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF4757;
            --primary-dark: #E63946;
            --bg: #FFF5F5;
            --card-bg: #FFFFFF;
            --text-dark: #1A1A2E;
            --text-secondary: #6B7280;
            --text-muted: #9CA3AF;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow: 0 4px 6px rgba(0,0,0,0.07);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
            --radius-2xl: 24px;
            --radius-xl: 20px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: var(--font);
            background: linear-gradient(135deg, #FFF5F5 0%, #FFE8EC 50%, #FFF0F0 100%);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 100px;
            background-attachment: fixed;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; padding: 20px 0; }
        .header-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
            color: var(--primary); font-size: 11px; font-weight: 600;
            padding: 6px 16px; border-radius: 100px; margin-bottom: 12px;
            border: 1px solid rgba(255,71,87,0.2); box-shadow: var(--shadow-sm);
        }
        .header h1 { font-size: 28px; font-weight: 800; color: var(--text-dark); letter-spacing: -0.5px; }
        .header h1 span { background: linear-gradient(135deg, var(--primary), #FF8A80); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 16px; }
        .stat-card {
            background: rgba(255,255,255,0.8); backdrop-filter: blur(20px);
            padding: 14px 10px; border-radius: var(--radius-lg); text-align: center;
            border: 1px solid rgba(255,255,255,0.3); box-shadow: var(--shadow-sm);
        }
        .stat-card .val { font-size: 22px; font-weight: 800; color: var(--text-dark); }
        .stat-card .lbl { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
        .tabs {
            display: flex; gap: 6px; margin-bottom: 16px; padding: 4px;
            background: rgba(255,255,255,0.6); backdrop-filter: blur(20px);
            border-radius: var(--radius-xl); border: 1px solid rgba(255,255,255,0.3);
        }
        .tabs button {
            flex: 1; padding: 10px 8px; border-radius: var(--radius-lg); border: none;
            background: transparent; font-size: 12px; font-weight: 500;
            color: var(--text-secondary); cursor: pointer; transition: var(--transition);
            font-family: var(--font); display: flex; align-items: center;
            justify-content: center; gap: 5px; position: relative;
        }
        .tabs button i { font-size: 14px; }
        .tabs button.active { background: #fff; color: var(--primary); font-weight: 600; box-shadow: var(--shadow); }
        .panel { display: none; animation: fadeIn 0.3s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .card {
            background: rgba(255,255,255,0.8); backdrop-filter: blur(20px);
            border-radius: var(--radius-xl); padding: 18px; margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.3); box-shadow: var(--shadow-sm);
        }
        .btn {
            padding: 10px 18px; border-radius: var(--radius-md); border: none;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: var(--transition);
            font-family: var(--font); display: inline-flex; align-items: center; gap: 6px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; box-shadow: 0 4px 12px rgba(255,71,87,0.3); }
        .btn-outline { background: #fff; border: 2px solid #F1F5F9; color: var(--text-dark); }
        .btn-danger { background: #EF4444; color: #fff; }
        .btn-sm { padding: 6px 14px; font-size: 11px; }
        .btn-xs { padding: 4px 10px; font-size: 10px; border-radius: 20px; }
        .tech-card { background: linear-gradient(135deg, #4ADE80, #22C55E); color: #fff; cursor: pointer; transition: var(--transition); }
        .tech-card.off { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
        .row-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
        .row-btns select { padding: 8px 14px; border: 2px solid #F1F5F9; border-radius: var(--radius-md); font-size: 13px; font-family: var(--font); background: #fff; }
        .menu-item {
            background: #fff; border-radius: var(--radius-lg); padding: 14px;
            display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
            border: 1px solid #F1F5F9; transition: var(--transition);
        }
        .menu-item:hover { box-shadow: var(--shadow); }
        .menu-item img { width: 56px; height: 56px; border-radius: var(--radius-md); object-fit: cover; background: #FCE4EC; flex-shrink: 0; }
        .menu-item .info { flex: 1; min-width: 0; }
        .menu-item .info .name { font-weight: 600; font-size: 14px; color: var(--text-dark); }
        .menu-item .info .desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .menu-item .info .price { font-weight: 700; color: var(--primary); font-size: 15px; margin-top: 4px; }
        .menu-item .info .price .old-price { text-decoration: line-through; color: var(--text-muted); font-weight: 500; font-size: 13px; margin-left: 6px; }
        .menu-item .actions { display: flex; gap: 4px; flex-shrink: 0; }
        .menu-item .actions button {
            width: 30px; height: 30px; border-radius: 50%; border: none; cursor: pointer;
            font-size: 12px; display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
        }
        .menu-item .actions button:active { transform: scale(0.9); }
        .btn-edit { background: #F1F5F9; color: #6B7280; }
        .btn-on { background: #E8F5E9; color: #2E7D32; }
        .btn-off { background: #FFEBEE; color: #D32F2F; }
        .order-card {
            background: #fff; border-radius: var(--radius-lg); padding: 14px;
            margin-bottom: 10px; border: 1px solid #F1F5F9;
        }
        .order-card .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .order-card .oid { font-weight: 700; color: var(--primary); font-size: 15px; }
        .order-card .status { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 100px; }
        .status-waiting { background: #FFF3E0; color: #E65100; }
        .status-done { background: #E8F5E9; color: #2E7D32; }
        .status-cancelled { background: #FFEBEE; color: #D32F2F; }
        .order-card .items { font-size: 12px; color: var(--text-secondary); background: #F8FAFC; padding: 8px 12px; border-radius: var(--radius-sm); margin-bottom: 6px; }
        .order-card .bottom { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .order-card .total { font-weight: 700; color: var(--primary); font-size: 16px; }
        .chat-item {
            background: #fff; border-radius: var(--radius-lg); padding: 14px;
            margin-bottom: 8px; border: 1px solid #F1F5F9; cursor: pointer; transition: var(--transition);
        }
        .chat-item:active { transform: scale(0.98); }
        .chat-item .cname { font-weight: 600; font-size: 14px; color: var(--text-dark); }
        .chat-item .cpreview { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .review-card {
            background: #fff; border-radius: var(--radius-lg); padding: 14px;
            margin-bottom: 8px; border: 1px solid #F1F5F9;
        }
        .review-card .stars { color: #FFB300; font-size: 16px; }
        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
        .empty-state i { font-size: 48px; display: block; margin-bottom: 12px; }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1A1A2E; color: #fff; padding: 12px 24px; border-radius: 100px;
            font-size: 13px; font-weight: 500; z-index: 9999; display: none;
            animation: slideUp 0.3s ease;
        }
        .toast.show { display: block; }
        @keyframes slideUp { from { transform: translate(-50%, 40px); opacity:0; } to { transform: translate(-50%, 0); opacity:1; } }
        .modal-overlay {
            display: none; position: fixed; top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(12px); z-index: 1000;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #fff; border-radius: var(--radius-2xl); max-width: 460px; width: 100%;
            max-height: 85vh; overflow-y: auto; padding: 24px; position: relative;
            box-shadow: var(--shadow-lg); animation: pop 0.3s ease;
        }
        @keyframes pop { from { transform: scale(0.9); opacity:0; } to { transform: scale(1); opacity:1; } }
        .modal-close {
            position: absolute; top: 14px; right: 14px; background: #F8FAFC;
            border: none; width: 32px; height: 32px; border-radius: 50%;
            font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-dark); margin-bottom: 4px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 10px 14px; border: 2px solid #F1F5F9; border-radius: var(--radius-md);
            font-size: 14px; background: #F8FAFC; outline: none; font-family: var(--font);
            transition: var(--transition);
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,71,87,0.1);
        }
        .img-upload {
            border: 2px dashed #F1F5F9; border-radius: var(--radius-lg); padding: 20px;
            text-align: center; cursor: pointer; background: #F8FAFC; transition: var(--transition);
        }
        .img-upload:hover { border-color: var(--primary); background: #FFF5F5; }
        .img-upload img { max-width: 100%; max-height: 150px; border-radius: var(--radius-md); margin-top: 8px; }
        @media (max-width: 500px) {
            .stats { grid-template-columns: 1fr 1fr; }
            .tabs button { font-size: 10px; padding: 8px 4px; }
            .menu-item { flex-direction: column; align-items: flex-start; }
            .menu-item .actions { align-self: flex-end; }
        }
    </style>
</head>
<body>

    <div class="toast" id="toast"></div>

    <div class="container">
        <div class="header">
            <div class="header-badge"><i class="fas fa-lock"></i> Панель управления</div>
            <h1><span>Strawberry</span> Админка</h1>
        </div>

        <div class="stats">
            <div class="stat-card"><div class="val" id="statTotal">0</div><div class="lbl">Всего заказов</div></div>
            <div class="stat-card"><div class="val" id="statActive">0</div><div class="lbl">Активных</div></div>
            <div class="stat-card"><div class="val" id="statToday">0</div><div class="lbl">За сегодня</div></div>
            <div class="stat-card"><div class="val" id="statRevenue">0 ₽</div><div class="lbl">Выручка</div></div>
        </div>

        <div class="card tech-card" id="techCard" onclick="toggleTechBreak()">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div>
                    <div style="font-weight:700;font-size:18px;" id="techLabel">✅ Всё работает</div>
                    <div style="font-size:12px;opacity:0.8;">Нажмите для переключения</div>
                </div>
                <div style="font-size:28px;opacity:0.6;"><i class="fas fa-power-off"></i></div>
            </div>
        </div>

        <div class="tabs">
            <button class="active" data-tab="orders"><i class="fas fa-list-alt"></i> Заказы</button>
            <button data-tab="menu"><i class="fas fa-utensils"></i> Меню</button>
            <button data-tab="chats"><i class="fas fa-comments"></i> Чаты</button>
            <button data-tab="reviews"><i class="fas fa-star"></i> Отзывы</button>
        </div>

        <div class="panel active" id="panel-orders">
            <div class="row-btns">
                <button class="btn btn-primary btn-sm" onclick="loadOrders()"><i class="fas fa-sync-alt"></i> Обновить</button>
                <button class="btn btn-outline btn-sm" onclick="clearOrders()"><i class="fas fa-trash"></i> Очистить историю</button>
            </div>
            <div id="ordersList"><div class="empty-state"><i class="fas fa-inbox"></i>Заказов пока нет</div></div>
        </div>

        <div class="panel" id="panel-menu">
            <div class="row-btns">
                <button class="btn btn-primary btn-sm" onclick="openItemModal()"><i class="fas fa-plus"></i> Добавить позицию</button>
                <button class="btn btn-outline btn-sm" onclick="loadMenu()"><i class="fas fa-sync-alt"></i> Обновить</button>
                <select id="menuFilter" onchange="renderMenu()">
                    <option value="all">Все категории</option>
                    <option value="strawberry">🍓 Клубника</option>
                    <option value="fruits">🍉 Фрукты</option>
                    <option value="drinks">🥤 Напитки</option>
                </select>
            </div>
            <div id="menuList"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i>Загрузка меню...</div></div>
        </div>

        <div class="panel" id="panel-chats">
            <div class="row-btns"><button class="btn btn-primary btn-sm" onclick="loadChats()"><i class="fas fa-sync-alt"></i> Обновить</button></div>
            <div id="chatsList"><div class="empty-state"><i class="fas fa-comment-dots"></i>Чатов пока нет</div></div>
        </div>

        <div class="panel" id="panel-reviews">
            <div class="row-btns"><button class="btn btn-primary btn-sm" onclick="loadReviews()"><i class="fas fa-sync-alt"></i> Обновить</button></div>
            <div id="reviewsList"><div class="empty-state"><i class="fas fa-star"></i>Отзывов пока нет</div></div>
        </div>
    </div>

    <!-- Модалка товара -->
    <div class="modal-overlay" id="itemModal">
        <div class="modal">
            <button class="modal-close" onclick="closeItemModal()"><i class="fas fa-times"></i></button>
            <div style="font-weight:700;font-size:18px;margin-bottom:14px;color:var(--text-dark);" id="modalTitle">
                <i class="fas fa-plus-circle" style="color:var(--primary);"></i> Новая позиция
            </div>
            <div class="form-group"><label>Название</label><input type="text" id="fName" placeholder="Например: Клубника в шоколаде"></div>
            <div class="form-group"><label>Описание</label><textarea id="fDesc" rows="2" placeholder="Краткое описание"></textarea></div>
            <div class="form-group"><label>Цена (₽)</label><input type="number" id="fPrice" placeholder="350"></div>
            <div class="form-group"><label>Старая цена (₽) — перечёркнутая</label><input type="number" id="fOldPrice" placeholder="770 (оставьте пустым если не нужна)"></div>
            <div class="form-group"><label>Объём/Вес</label><input type="text" id="fVolume" placeholder="300 мл"></div>
            <div class="form-group"><label>Категория</label>
                <select id="fCategory">
                    <option value="strawberry">🍓 Клубника в шоколаде</option>
                    <option value="fruits">🍉 Свежие фрукты</option>
                    <option value="drinks">🥤 Напитки и перекус</option>
                </select>
            </div>
            <div class="form-group"><label>Эмодзи</label><input type="text" id="fEmoji" placeholder="🍓"></div>
            <div class="form-group"><label>Бейдж (опционально)</label><input type="text" id="fBadge" placeholder="🔥 Хит"></div>
            <div class="form-group">
                <label>Изображение</label>
                <div class="img-upload" onclick="document.getElementById('fImageInput').click()">
                    <i class="fas fa-cloud-upload-alt" style="font-size:32px;color:var(--text-muted);display:block;margin-bottom:8px;"></i>
                    <span style="font-size:13px;color:var(--text-secondary);">Нажмите для загрузки</span>
                    <img id="fImagePreview" style="display:none;">
                </div>
                <input type="file" id="fImageInput" accept="image/*" style="display:none;" onchange="previewImage(event)">
            </div>
            <input type="hidden" id="fId">
            <input type="hidden" id="fImageData">
            <button class="btn btn-primary" style="width:100%;" onclick="saveItem()"><i class="fas fa-save"></i> Сохранить</button>
            <button class="btn btn-danger btn-sm" id="fDeleteBtn" style="width:100%;margin-top:8px;display:none;" onclick="deleteItem()"><i class="fas fa-trash"></i> Удалить позицию</button>
        </div>
    </div>

    <!-- Модалка чата -->
    <div class="modal-overlay" id="chatModal">
        <div class="modal" style="display:flex;flex-direction:column;max-height:75vh;padding:0;">
            <div style="padding:14px 20px;border-bottom:1px solid #F1F5F9;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;">
                <div style="font-weight:700;font-size:16px;color:var(--text-dark);" id="chatTitle">💬 Чат с клиентом</div>
                <button class="modal-close" style="position:static;" onclick="closeChatModal()"><i class="fas fa-times"></i></button>
            </div>
            <div id="chatMessages" style="flex:1;padding:16px 20px;overflow-y:auto;max-height:45vh;"></div>
            <div style="padding:12px 20px;border-top:1px solid #F1F5F9;display:flex;gap:8px;flex-shrink:0;">
                <input type="text" id="chatInput" placeholder="Введите сообщение..." style="flex:1;padding:10px 14px;border:2px solid #F1F5F9;border-radius:var(--radius-md);font-size:14px;outline:none;font-family:var(--font);" onkeydown="if(event.key==='Enter')sendChat()">
                <button class="btn btn-primary btn-sm" onclick="sendChat()">📤 Отправить</button>
            </div>
        </div>
    </div>

    <script>
        // ===== STATE =====
        const S = {
            settings: {},
            menu: [],
            tab: 'orders',
            chatPhone: null,
            orders: []
        };

        const $ = id => document.getElementById(id);

        function toast(msg) {
            const t = $('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._t);
            t._t = setTimeout(() => t.classList.remove('show'), 2500);
        }

        async function api(url, method = 'GET', body = null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch('/api' + url, opts);
            return res.json();
        }

        // ===== TABS =====
        document.querySelectorAll('.tabs button').forEach(b => {
            b.addEventListener('click', function() {
                S.tab = this.dataset.tab;
                document.querySelectorAll('.tabs button').forEach(x => x.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                $('panel-' + S.tab).classList.add('active');
                if (S.tab === 'orders') loadOrders();
                if (S.tab === 'menu') loadMenu();
                if (S.tab === 'chats') loadChats();
                if (S.tab === 'reviews') loadReviews();
            });
        });

        // ===== TECH BREAK =====
        async function toggleTechBreak() {
            const v = !S.settings.technicalBreak;
            const d = await api('/settings', 'POST', { technicalBreak: v });
            if (d.success) { S.settings = d.settings; updateTechUI(); toast(v ? '🔧 Технический перерыв' : '✅ Работаем'); }
        }

        function updateTechUI() {
            const card = $('techCard'), label = $('techLabel');
            if (S.settings.technicalBreak) { card.classList.add('off'); label.textContent = '🔧 Технический перерыв'; }
            else { card.classList.remove('off'); label.textContent = '✅ Всё работает'; }
        }

        // ===== ORDERS =====
        async function loadOrders() {
            const orders = await api('/orders');
            S.orders = orders;
            updateStats(orders);
            renderOrders();
        }

        function updateStats(orders) {
            const today = new Date().toDateString();
            const active = orders.filter(o => o.status === 'ожидает');
            let revenue = 0;
            orders.forEach(o => { if (o.items) o.items.forEach(i => revenue += (i.price || 0) * (i.quantity || 1)); });
            $('statTotal').textContent = orders.length;
            $('statActive').textContent = active.length;
            $('statToday').textContent = orders.filter(o => new Date(o.createdAt).toDateString() === today).length;
            $('statRevenue').textContent = revenue + ' ₽';
        }

        function renderOrders() {
            const orders = S.orders;
            const list = $('ordersList');
            if (!orders.length) { list.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i>Заказов нет</div>'; return; }
            list.innerHTML = [...orders].reverse().map(order => {
                const itemsHtml = order.items?.map(i => `${i.name} ×${i.quantity} — ${(i.price||0)*(i.quantity||1)}₽`).join('<br>') || '';
                let sc = 'status-waiting';
                if (order.status === 'выполнен') sc = 'status-done';
                if (order.status?.includes('отменен')) sc = 'status-cancelled';
                const acts = order.status === 'ожидает' ? `<button class="btn btn-primary btn-xs" onclick="confirmOrder(${order.id},'${order.confirmCode}')">✅</button><button class="btn btn-danger btn-xs" onclick="cancelOrder(${order.id})">❌</button>` : '';
                return `<div class="order-card"><div class="top"><span class="oid">🏠 #${order.bungalow||'?'} — #${order.id}</span><span class="status ${sc}">${order.status||'ожидает'}</span></div><div style="font-size:12px;color:var(--text-secondary);">👤 ${order.customerName||'-'} 📞 ${order.customerPhone||'-'} ${order.confirmCode?'🔑 <b>'+order.confirmCode+'</b>':''}</div><div class="items">${itemsHtml}</div><div class="bottom"><span class="total">💰 ${order.total||0} ₽</span><span style="font-size:10px;color:var(--text-muted);">${new Date(order.createdAt).toLocaleString()}</span><div style="display:flex;gap:4px;">${acts}</div></div></div>`;
            }).join('');
        }

        async function confirmOrder(id, code) { if(!confirm('Подтвердить?'))return; await api('/confirm','POST',{orderId:id,code}); toast('✅ Доставлено'); loadOrders(); }
        async function cancelOrder(id) { if(!confirm('Отменить?'))return; await api('/cancel','POST',{orderId:id}); toast('❌ Отменён'); loadOrders(); }
        async function clearOrders() { if(!confirm('Удалить все?'))return; await api('/clear-orders','POST'); toast('🗑️ Очищено'); loadOrders(); }

        // ===== MENU =====
     const CATALOG = [
    { id:'9', name:'Для влюбленных', desc:'Тиффани + Классика', price:699, oldPrice:770, volume:'300 мл', emoji:'❤️', category:'strawberry', image:'images/romantic.jpg', badge:'❤️' },
    { id:'1', name:'Классика', desc:'Клубника в молочном шоколаде', price:350, volume:'300 мл', emoji:'🍫', category:'strawberry', image:'images/klassika.jpg', badge:'🔥 Хит' },
    { id:'2', name:'Белый шоколад', desc:'Нежная ягода в сливочном', price:380, volume:'300 мл', emoji:'🤍', category:'strawberry', image:'images/belyy-shokolad.jpg', badge:'⭐' },
    { id:'3', name:'Тиффани', desc:'Бирюзовый шоколад', price:420, volume:'300 мл', emoji:'💎', category:'strawberry', image:'images/tiffani.jpg', badge:'✨' },
    { id:'4', name:'Микс клубника-банан', desc:'Клубника и банан', price:400, volume:'300 мл', emoji:'🍌', category:'strawberry', image:'images/miks.jpg' },
    { id:'5', name:'Банан в шоколаде', desc:'Спелый банан', price:320, volume:'300 мл', emoji:'🍌', category:'strawberry', image:'images/banan.jpg' },
    { id:'16', name:'Клубника в стакане', desc:'Свежая клубника без шоколада', price:250, volume:'300 мл', emoji:'🍓', category:'strawberry', image:'images/klubnika-bez-shokolada.jpg' },
    { id:'11', name:'Сладкий арбуз', desc:'Сочный арбуз', price:200, volume:'300 мл', emoji:'🍉', category:'fruits', image:'images/watermelon.jpg' },
    { id:'12', name:'Дыня', desc:'Нежная дыня', price:200, volume:'300 мл', emoji:'🍈', category:'fruits', image:'images/melon.jpg' },
    { id:'13', name:'Малина', desc:'Свежая малина', price:250, volume:'200 мл', emoji:'🍓', category:'fruits', image:'images/raspberry.jpg' },
    { id:'14', name:'Ежевика', desc:'Сочная ежевика', price:200, volume:'200 мл', emoji:'🫐', category:'fruits', image:'images/blackberry.jpg' },
    { id:'15', name:'Голубика', desc:'Полезная голубика', price:250, volume:'200 мл', emoji:'🫐', category:'fruits', image:'images/blueberry.jpg' },
    { id:'6', name:'Лимонад', desc:'Домашний лимонад', price:150, volume:'', emoji:'🍋', category:'drinks', image:'images/limonad.webp' },
    { id:'7', name:'Кока-Кола', desc:'Охлажденная', price:120, volume:'', emoji:'🥤', category:'drinks', image:'images/kola.jpg' },
    { id:'8', name:'Пиво', desc:'Охлажденное', price:200, volume:'', emoji:'🍺', category:'drinks', image:'images/pivo.webp' },
    { id:'10', name:'Шаурма с курицей', desc:'Сочная курица, овощи', price:350, volume:'', emoji:'🌯', category:'drinks', image:'images/shaurma.webp' }
];

        async function loadMenu() {
            try {
                const d = await api('/settings');
                S.settings = d;
                updateTechUI();
                
                S.menu = CATALOG.map(item => ({ ...item, available: d.menuItems?.[item.id] !== false }));
                
                if (d.customItems && Array.isArray(d.customItems)) {
                    d.customItems.forEach(ci => {
                        const idx = S.menu.findIndex(x => x.id === ci.id);
                        if (idx >= 0) {
                            S.menu[idx] = { ...S.menu[idx], ...ci, available: d.menuItems?.[ci.id] !== false, isCustom: true };
                        } else {
                            S.menu.push({ ...ci, available: d.menuItems?.[ci.id] !== false, isCustom: true });
                        }
                    });
                }
                
                renderMenu();
            } catch(e) {
                console.error(e);
                $('menuList').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle" style="color:#D32F2F;"></i>Ошибка загрузки<br><button class="btn btn-primary btn-sm" onclick="loadMenu()">Повторить</button></div>';
            }
        }

        function renderMenu() {
            const filter = $('menuFilter').value;
            let items = S.menu;
            if (filter !== 'all') items = items.filter(x => x.category === filter);
            
            const list = $('menuList');
            if (!items.length) { list.innerHTML = '<div class="empty-state"><i class="fas fa-utensils"></i>Нет позиций</div>'; return; }
            
            list.innerHTML = items.map(x => `
                <div class="menu-item">
                    <img src="${x.image}" onerror="this.style.display='none'" loading="lazy" alt="${x.name}">
                    <div class="info">
                        <div class="name">
                            ${x.emoji||''} ${x.name}
                            ${x.badge ? `<span style="font-size:10px;background:#FCE4EC;color:#E91E63;padding:2px 8px;border-radius:10px;margin-left:4px;">${x.badge}</span>` : ''}
                            ${x.isCustom ? `<span style="font-size:10px;background:#E3F2FD;color:#1565C0;padding:2px 8px;border-radius:10px;margin-left:4px;">изменено</span>` : ''}
                        </div>
                        <div class="desc">${x.desc} ${x.volume ? '• ' + x.volume : ''}</div>
                        <div class="price">
                            ${x.price} ₽
                            ${x.oldPrice ? `<span class="old-price">${x.oldPrice} ₽</span>` : ''}
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn-edit" onclick="editItem('${x.id}')" title="Редактировать"><i class="fas fa-pen"></i></button>
                        <button class="${x.available ? 'btn-on' : 'btn-off'}" onclick="toggleItem('${x.id}')" title="${x.available ? 'Скрыть' : 'Показать'}"><i class="fas ${x.available ? 'fa-eye' : 'fa-eye-slash'}"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function openItemModal(item = null) {
            $('fId').value = item ? item.id : '';
            $('fName').value = item ? item.name : '';
            $('fDesc').value = item ? item.desc : '';
            $('fPrice').value = item ? item.price : '';
            $('fOldPrice').value = item ? (item.oldPrice || '') : '';
            $('fVolume').value = item ? (item.volume || '') : '';
            $('fCategory').value = item ? (item.category || 'strawberry') : 'strawberry';
            $('fEmoji').value = item ? (item.emoji || '') : '';
            $('fBadge').value = item ? (item.badge || '') : '';
            $('fImageData').value = item ? (item.image || '') : '';
            $('fDeleteBtn').style.display = item ? 'block' : 'none';
            $('modalTitle').innerHTML = item ? '<i class="fas fa-pen" style="color:var(--primary);"></i> Редактирование' : '<i class="fas fa-plus-circle" style="color:var(--primary);"></i> Новая позиция';
            
            const prev = $('fImagePreview');
            if (item && item.image) { prev.src = item.image; prev.style.display = 'block'; }
            else { prev.style.display = 'none'; }
            
            $('itemModal').classList.add('open');
        }

        function editItem(id) {
            const item = S.menu.find(x => x.id === id);
            if (item) openItemModal(item);
        }

        function closeItemModal() { $('itemModal').classList.remove('open'); }

        function previewImage(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => { $('fImagePreview').src = ev.target.result; $('fImagePreview').style.display = 'block'; $('fImageData').value = ev.target.result; };
            reader.readAsDataURL(file);
        }

        async function toggleItem(id) {
            const cur = S.settings.menuItems?.[id] !== false;
            const d = await api('/settings', 'POST', { menuItems: { [id]: !cur } });
            if (d.success) {
                S.settings = d.settings;
                const mi = S.menu.find(x => x.id === id);
                if (mi) mi.available = !cur;
                renderMenu();
                toast(cur ? '❌ Скрыто' : '✅ Показано');
            }
        }

        async function saveItem() {
            const id = $('fId').value;
            const name = $('fName').value.trim();
            const price = parseInt($('fPrice').value);
            const oldPrice = parseInt($('fOldPrice').value) || null;
            
            if (!name || !price || isNaN(price)) {
                toast('❌ Заполните название и цену');
                return;
            }

            const item = {
                id: id || String(Date.now()),
                name: name,
                desc: $('fDesc').value.trim(),
                price: price,
                oldPrice: oldPrice,
                volume: $('fVolume').value.trim(),
                category: $('fCategory').value,
                emoji: $('fEmoji').value.trim(),
                badge: $('fBadge').value.trim(),
                image: $('fImageData').value || 'images/placeholder.jpg',
                isCustom: true
            };

            if (!S.settings.customItems) S.settings.customItems = [];
            
            const idx = S.settings.customItems.findIndex(x => x.id === item.id);
            if (idx >= 0) S.settings.customItems[idx] = item;
            else S.settings.customItems.push(item);

            S.settings.menuItems = S.settings.menuItems || {};
            S.settings.menuItems[item.id] = true;

            try {
                const d = await api('/settings', 'POST', {
                    customItems: S.settings.customItems,
                    menuItems: S.settings.menuItems
                });
                
                if (d.success) {
                    S.settings = d.settings;
                    closeItemModal();
                    await loadMenu();
                    toast('✅ Сохранено');
                } else {
                    toast('❌ Ошибка сервера');
                }
            } catch(e) {
                console.error(e);
                toast('❌ Ошибка соединения');
            }
        }

        async function deleteItem() {
            const id = $('fId').value;
            if (!id || !confirm('Удалить позицию?')) return;
            
            if (S.settings.customItems) S.settings.customItems = S.settings.customItems.filter(x => x.id !== id);
            S.settings.menuItems = S.settings.menuItems || {};
            S.settings.menuItems[id] = false;
            
            const d = await api('/settings', 'POST', {
                customItems: S.settings.customItems,
                menuItems: S.settings.menuItems
            });
            
            if (d.success) { S.settings = d.settings; closeItemModal(); await loadMenu(); toast('🗑️ Удалено'); }
        }

        // ===== CHATS =====
        async function loadChats() {
            const d = await api('/chats');
            const chats = d.chats || [];
            const list = $('chatsList');
            if (!chats.length) { list.innerHTML = '<div class="empty-state"><i class="fas fa-comment-dots"></i>Чатов нет</div>'; return; }
            list.innerHTML = chats.map(c => `
                <div class="chat-item" onclick="openChat('${c.phone}','${c.name||'Клиент'}')">
                    <div class="cname">👤 ${c.name||'Клиент'} 📞 ${c.phone}</div>
                    <div class="cpreview">${c.lastMessage?.text||'Нет сообщений'} ${c.unread?`<span style="background:var(--primary);color:#fff;padding:1px 6px;border-radius:8px;font-size:10px;">${c.unread}</span>`:''}</div>
                </div>`).join('');
        }

        async function openChat(phone, name) {
            S.chatPhone = phone;
            $('chatTitle').textContent = `💬 ${name} (${phone})`;
            $('chatModal').classList.add('open');
            await api('/chat-read', 'POST', { phone });
            loadMessages();
        }

        async function loadMessages() {
            const d = await api('/chat-messages?phone=' + S.chatPhone);
            const msgs = d.messages || [];
            const c = $('chatMessages');
            if (!msgs.length) { c.innerHTML = '<div class="empty-state">Начните диалог</div>'; return; }
            c.innerHTML = msgs.map(m => `
                <div style="margin-bottom:6px;display:flex;justify-content:${m.from==='client'?'flex-start':'flex-end'};">
                    <div style="max-width:80%;padding:8px 12px;border-radius:${m.from==='client'?'var(--radius-lg) var(--radius-lg) var(--radius-lg) 4px':'var(--radius-lg) var(--radius-lg) 4px var(--radius-lg)'};background:${m.from==='client'?'#F8FAFC':'linear-gradient(135deg,var(--primary),var(--primary-dark))'};color:${m.from==='client'?'var(--text-dark)':'#fff'};font-size:13px;">
                        ${m.text}<span style="font-size:9px;display:block;margin-top:3px;opacity:0.6;">${new Date(m.time).toLocaleTimeString()}</span>
                    </div>
                </div>`).join('');
            c.scrollTop = c.scrollHeight;
        }

        async function sendChat() {
            const t = $('chatInput').value.trim();
            if (!t || !S.chatPhone) return;
            await api('/chat-send', 'POST', { phone: S.chatPhone, text: t, from: 'admin' });
            $('chatInput').value = '';
            loadMessages();
            loadChats();
        }

        function closeChatModal() { $('chatModal').classList.remove('open'); S.chatPhone = null; }

        // ===== REVIEWS =====
        async function loadReviews() {
            const d = await api('/reviews');
            const revs = d.reviews || [];
            const list = $('reviewsList');
            if (!revs.length) { list.innerHTML = '<div class="empty-state"><i class="fas fa-star"></i>Отзывов нет</div>'; return; }
            list.innerHTML = revs.map(r => `
                <div class="review-card">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <span style="font-weight:600;">${r.name||'Клиент'}</span>
                        <span class="stars">${'⭐'.repeat(r.rating||5)}</span>
                    </div>
                    <div style="font-size:13px;color:var(--text-secondary);margin:4px 0;">${r.text||''}</div>
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <span style="font-size:10px;color:var(--text-muted);">#${r.orderId} • ${new Date(r.createdAt).toLocaleString()}</span>
                        <button class="btn btn-danger btn-xs" onclick="deleteReview(${r.id})">🗑️</button>
                    </div>
                </div>`).join('');
        }

        async function deleteReview(id) { if(!confirm('Удалить?'))return; await fetch('/api/review/'+id,{method:'DELETE'}); toast('🗑️ Удалён'); loadReviews(); }

        // ===== MODAL CLOSE =====
        $('itemModal').addEventListener('click', function(e) { if(e.target===this) closeItemModal(); });
        $('chatModal').addEventListener('click', function(e) { if(e.target===this) closeChatModal(); });

        // ===== AUTO REFRESH =====
        let lastCount = 0;
        setInterval(async () => {
            try {
                const o = await api('/orders');
                if (o.length > lastCount && lastCount > 0) toast('📦 Новый заказ!');
                lastCount = o.length;
                if (S.tab === 'orders') { S.orders = o; updateStats(o); renderOrders(); }
                if (S.tab === 'chats') loadChats();
            } catch(e) {}
        }, 10000);

        // ===== INIT =====
        async function init() {
            await loadMenu();
            await loadOrders();
            lastCount = S.orders.length;
            console.log('🍓 Админка v7 — с поддержкой старой цены');
        }
        init();
    </script>
</body>
</html>
